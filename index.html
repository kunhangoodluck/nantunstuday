<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>互動學習平台1.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#FFF8F0; --bg-card:#FFF; --primary:#FF6B35; --primary-light:#FF8C5A;
      --primary-pale:#FFF0E8; --secondary:#1B4965; --secondary-light:#2D6A8F;
      --accent:#5FA777; --accent-light:#E8F5ED; --text:#2C2C2C; --text-light:#6B7280;
      --border:#E5E7EB; --shadow:0 2px 12px rgba(0,0,0,.08);
      --shadow-lg:0 8px 32px rgba(0,0,0,.12); --radius:16px; --radius-sm:10px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    button,a,.book-card,.history-item,.tab-btn,.btn-consent,.btn-play,.btn-nav,.btn-close-modal,.btn-download{
      touch-action:manipulation;-webkit-touch-callout:none;cursor:pointer;
    }
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* CONSENT */
#consent-screen{position:fixed;inset:0;background:linear-gradient(135deg,#FF6B35,#FF8C5A 40%,#FFA96B);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .4s,transform .4s}
#consent-screen.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
.consent-box{background:#fff;border-radius:24px;padding:48px 36px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .5s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.consent-icon{font-size:64px;margin-bottom:16px;display:block}
.consent-box h1{font-size:26px;font-weight:900;color:var(--secondary);margin-bottom:12px}
.consent-box p{font-size:15px;color:var(--text-light);line-height:1.7;margin-bottom:28px}
.consent-features{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.consent-features span{background:var(--primary-pale);color:var(--primary);font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px}
.btn-consent{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;padding:16px 48px;font-size:18px;font-weight:700;border-radius:50px;font-family:inherit;box-shadow:0 4px 20px rgba(255,107,53,.4);transition:transform .15s}
.btn-consent:active{transform:scale(.96)}

/* HEADER */
.app-header{background:#fff;padding:14px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.site-title{font-size:20px;font-weight:900;color:var(--secondary)}
.site-title span{color:var(--primary)}

/* TABS */
.tab-nav{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;z-index:99;max-width:800px;margin:0 auto}
.tab-btn{flex:1;padding:14px 8px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text-light);position:relative;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab-btn .tab-icon{font-size:20px}
.tab-btn.active{color:var(--primary);font-weight:700}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:20%;right:20%;height:3px;background:var(--primary);border-radius:3px 3px 0 0}

/* MAIN */
.main-content{max-width:800px;margin:0 auto;padding:20px 16px 100px}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SCANNER */
.scanner-wrapper{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.scanner-header{padding:20px 20px 12px}
.scanner-header h2{font-size:20px;font-weight:700;color:var(--secondary);margin-bottom:6px}
.scanner-header p{font-size:14px;color:var(--text-light)}
#qr-reader{width:100%;min-height:280px;max-height:400px;background:#1a1a2e;position:relative}
#qr-reader video{object-fit:cover}
.scanner-status{padding:16px 20px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500}
.status-dot{width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0}
.status-dot.scanning{background:#22c55e;animation:pulse 1.5s infinite}
.status-dot.found{background:var(--primary)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}

/* AUDIO PLAYER */
.audio-player{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;display:none}
.audio-player.visible{display:block;animation:fadeIn .25s}
.audio-player-title{font-size:16px;font-weight:700;color:var(--secondary);margin-bottom:4px}
.audio-player-file{font-size:13px;color:var(--text-light);margin-bottom:14px;word-break:break-all}
.audio-controls{display:flex;align-items:center;gap:12px}
.btn-play{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(255,107,53,.3)}
.progress-bar{flex:1;height:24px;display:flex;align-items:center;cursor:pointer;position:relative}
.progress-track{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:var(--primary);border-radius:3px;transition:width .1s linear}
.audio-time{font-size:12px;color:var(--text-light);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}

/* HISTORY */
.audio-history{margin-top:20px}
.audio-history h3{font-size:15px;font-weight:700;color:var(--text-light);margin-bottom:10px}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg-card);border-radius:var(--radius-sm);margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:background .15s}
.history-item:active{background:var(--primary-pale)}
.history-icon{width:36px;height:36px;background:var(--primary-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.history-info{flex:1;min-width:0}
.history-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-time{font-size:12px;color:var(--text-light)}

/* BOOKS */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.book-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .15s}
.book-card:active{transform:scale(.97)}
.book-cover{width:100%;padding-top:133%;background:linear-gradient(135deg,var(--secondary),var(--secondary-light));position:relative}
.book-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.book-cover-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px}
.book-info{padding:12px 14px}
.book-title{font-size:15px;font-weight:700;margin-bottom:4px}
.book-desc{font-size:12px;color:var(--text-light)}
.book-pages-count{font-size:12px;color:var(--primary);font-weight:500;margin-top:4px}

/* BOOK MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;flex-direction:column}
.modal-overlay.open{display:flex}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:#fff}
.modal-title{font-size:16px;font-weight:700}
.modal-page-info{font-size:13px;opacity:.7}
.btn-close-modal{background:rgba(255,255,255,.15);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px}
.modal-body{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:8px}
.modal-body img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px}
.modal-nav{display:flex;justify-content:center;gap:16px;padding:12px 16px 24px}
.btn-nav{background:rgba(255,255,255,.15);border:none;color:#fff;padding:12px 28px;border-radius:50px;font-size:15px;font-weight:600;font-family:inherit;transition:background .15s}
.btn-nav:active{background:rgba(255,255,255,.3)}
.btn-nav:disabled{opacity:.3}

/* WORKSHEETS */
.worksheet-list{display:flex;flex-direction:column;gap:12px}
.worksheet-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;display:flex;align-items:center;gap:14px}
.ws-icon{width:48px;height:48px;background:var(--accent-light);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ws-info{flex:1;min-width:0}
.ws-title{font-size:15px;font-weight:700;margin-bottom:2px}
.ws-meta{font-size:12px;color:var(--text-light)}
.ws-tags{display:flex;gap:6px;margin-top:6px}
.ws-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--primary-pale);color:var(--primary);font-weight:500}
.ws-tag.subject{background:#E8F0FE;color:#1a5fb4}
.btn-download{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;text-decoration:none;white-space:nowrap}

/* MISC */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .empty-icon{font-size:56px;margin-bottom:16px;display:block}
.empty-state h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px;line-height:1.6}
.section-header{margin-bottom:16px}
.section-header h2{font-size:22px;font-weight:900;color:var(--secondary);margin-bottom:4px}
.section-header p{font-size:14px;color:var(--text-light)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--secondary);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);z-index:999;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(min-width:600px){.consent-box{padding:56px 48px}.book-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
#qr-reader__dashboard,#qr-reader__status_span,#qr-reader__header_message,#qr-reader img[alt="Info icon"],#qr-reader a{display:none!important}
#qr-reader__scan_region{min-height:0!important}
#qr-reader__scan_region video{border-radius:0!important}

<body>

  <!-- CONSENT SCREEN -->

  <div id="consent-screen">
    <div class="consent-box">
      <span class="consent-icon">🎧</span>
      <h1>互動學習平台</h1>
      <p>本平台需要使用您的相機來掃描 QR Code，<br>掃描後將自動播放對應的音檔。</p>
      <div class="consent-features">
        <span>📷 相機掃描</span>
        <span>🔊 自動播放</span>
        <span>📖 數位閱讀</span>
      </div>
      <button class="btn-consent" id="btn-agree">同意並開始使用</button>
    </div>
  </div>

  <!-- APP -->

  <header class="app-header" id="app-header">
    <div class="header-inner">
      <div class="site-title" id="site-title">📚 互動<span>學習</span>平台</div>
    </div>
  </header>

  <nav class="tab-nav" id="tab-nav">
    <button class="tab-btn active" data-tab="scanner"><span class="tab-icon">📷</span>掃描播放</button>
    <button class="tab-btn" data-tab="books"><span class="tab-icon">📖</span>數位書籍</button>
    <button class="tab-btn" data-tab="worksheets"><span class="tab-icon">📝</span>學習單</button>
  </nav>

  <main class="main-content">
    <div class="tab-panel active" id="panel-scanner">
      <div class="scanner-wrapper">
        <div class="scanner-header">
          <h2>📷 掃描 QR Code</h2>
          <p>將 QR Code 對準鏡頭，掃描成功後自動播放音檔</p>
        </div>
        <div id="qr-reader"></div>
        <div class="scanner-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">準備中...</span>
        </div>
      </div>
      <div class="audio-player" id="audio-player">
        <div class="audio-player-title" id="audio-title">正在播放</div>
        <div class="audio-player-file" id="audio-file-name"></div>
        <div class="audio-controls">
          <button class="btn-play" id="btn-play">▶</button>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
          </div>
          <span class="audio-time" id="audio-time">0:00</span>
        </div>
      </div>
      <div class="audio-history" id="audio-history" style="display:none">
        <h3>📜 播放紀錄</h3>
        <div id="history-list"></div>
      </div>
    </div>
    <div class="tab-panel" id="panel-books">
      <div class="section-header"><h2>📖 數位書籍</h2><p>點擊書籍封面即可翻頁瀏覽</p></div>
      <div class="book-grid" id="book-grid"></div>
    </div>
    <div class="tab-panel" id="panel-worksheets">
      <div class="section-header"><h2>📝 學習單下載</h2><p>點擊下載按鈕即可取得學習單</p></div>
      <div class="worksheet-list" id="worksheet-list"></div>
    </div>
  </main>

  <div class="modal-overlay" id="book-modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-book-title"></div><div class="modal-page-info" id="modal-page-info"></div></div>
      <button class="btn-close-modal" id="btn-close-book">✕</button>
    </div>
    <div class="modal-body"><img id="modal-page-img" src="" alt="書頁"></div>
    <div class="modal-nav">
      <button class="btn-nav" id="btn-prev">◀ 上一頁</button>
      <button class="btn-nav" id="btn-next">下一頁 ▶</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function() {
    "use strict";

    /* === STATE === */
    var config = null, scanner = null, isScanning = false;
    var playHistory = [], currentBook = null, currentPageIndex = 0;
    var consentDone = false, lastScanTime = 0;

    /* AudioContext 音訊系統 */
    var audioCtx = null;
    var currentSource = null;
    var currentBuffer = null;
    var audioStartTime = 0;
    var audioOffset = 0;
    var isPlaying = false;
    var progressTimer = null;

    /* DOM cache */
    var D = {};

    function cacheDom() {
      ['consent-screen','status-dot','status-text','audio-player','audio-title',
       'audio-file-name','btn-play','progress-fill','progress-bar','audio-time',
       'audio-history','history-list','book-grid','worksheet-list','book-modal',
       'modal-page-img','modal-book-title','modal-page-info','btn-prev','btn-next',
       'site-title','app-header','tab-nav','toast'].forEach(function(id) {
        D[id] = document.getElementById(id);
      });
    }

    /* === CONFIG === */
    function loadConfig() {
      fetch('config.json?' + Date.now()).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).then(function(d) {
        config = d;
        if (config.siteName) {
          D['site-title'].innerHTML = config.siteName.replace(/學習/g, '<span>學習</span>');
          document.title = config.siteName.replace(/[📚📖📷]/g, '').trim();
        }
        renderBooks();
        renderWorksheets();
      }).catch(function(e) {
        console.error('config:', e);
        showToast('⚠️ 無法載入設定檔');
      });
    }

    /* === CONSENT === */
    function handleConsent() {
      if (consentDone) return;
      consentDone = true;

      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
        var buf = audioCtx.createBuffer(1, 1, 22050);
        var src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        src.start(0);
      } catch(e) { console.warn('AudioCtx:', e); }

      startScanner();

      var cs = D['consent-screen'];
      cs.classList.add('hidden');
      setTimeout(function() { cs.style.display = 'none'; }, 400);
    }

    /* === SCANNER === */
    function startScanner() {
      if (typeof Html5Qrcode === 'undefined') {
        D['status-text'].textContent = '⚠️ 掃描器載入失敗，請重新整理';
        return;
      }
      scanner = new Html5Qrcode('qr-reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: function(w, h) { var s = Math.min(w, h) * 0.7; return { width: s, height: s }; }, disableFlip: false },
        onScanSuccess,
        function() {}
      ).then(function() {
        isScanning = true;
        D['status-dot'].classList.add('scanning');
        D['status-text'].textContent = '掃描中，請將 QR Code 對準鏡頭...';
      }).catch(function(err) {
        console.error('cam:', err);
        D['status-text'].textContent = '⚠️ 無法啟動相機，請確認已授權相機權限';
      });
    }

    function stopScanner() {
      if (scanner && isScanning) {
        scanner.stop().then(function() { isScanning = false; D['status-dot'].classList.remove('scanning'); }).catch(function() {});
      }
    }

    function onScanSuccess(text) {
      var now = Date.now();
      if (now - lastScanTime < 1500) return;
      lastScanTime = now;

      D['status-dot'].classList.remove('scanning');
      D['status-dot'].classList.add('found');
      D['status-text'].textContent = '✅ 掃描成功，正在播放...';

      var url = text, name = '';
      if (config && config.audioFiles) {
        for (var i = 0; i < config.audioFiles.length; i++) {
          if (config.audioFiles[i].id === text || config.audioFiles[i].file === text) {
            url = config.audioFiles[i].file;
            name = config.audioFiles[i].name;
            break;
          }
        }
      }
      playAudio(url, name || text);

      setTimeout(function() {
        D['status-dot'].classList.remove('found');
        D['status-dot'].classList.add('scanning');
        D['status-text'].textContent = '掃描中，請將 QR Code 對準鏡頭...';
      }, 2500);
    }

    /* === AUDIO (pure AudioContext) === */
    function playAudio(url, name) {
      stopCurrentAudio();

      D['audio-title'].textContent = name || '正在播放';
      D['audio-file-name'].textContent = url;
      D['audio-player'].classList.add('visible');
      D['btn-play'].textContent = '⏳';
      D['progress-fill'].style.width = '0%';
      D['audio-time'].textContent = '0:00';

      if (!audioCtx) { showToast('⚠️ 請重新整理頁面'); return; }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      fetch(url).then(function(r) {
        if (!r.ok) throw new Error('找不到音檔 (' + r.status + ')');
        return r.arrayBuffer();
      }).then(function(ab) {
        return audioCtx.decodeAudioData(ab);
      }).then(function(decoded) {
        currentBuffer = decoded;
        audioOffset = 0;
        startPlayback();
      }).catch(function(e) {
        console.error('audio load:', e);
        showToast('⚠️ ' + e.message);
        D['btn-play'].textContent = '▶';
      });

      addToHistory(name || url, url);
    }

    function startPlayback() {
      if (!currentBuffer || !audioCtx) return;
      stopSource();
      currentSource = audioCtx.createBufferSource();
      currentSource.buffer = currentBuffer;
      currentSource.connect(audioCtx.destination);
      var off = Math.min(audioOffset, currentBuffer.duration);
      currentSource.start(0, off);
      audioStartTime = audioCtx.currentTime;
      isPlaying = true;
      D['btn-play'].textContent = '⏸';

      currentSource.onended = function() {
        if (isPlaying) {
          isPlaying = false;
          audioOffset = 0;
          D['btn-play'].textContent = '▶';
          D['progress-fill'].style.width = '0%';
          D['audio-time'].textContent = formatTime(currentBuffer ? currentBuffer.duration : 0);
          clearInterval(progressTimer);
        }
      };
      clearInterval(progressTimer);
      progressTimer = setInterval(updateProgress, 100);
    }

    function stopSource() {
      if (currentSource) {
        try { currentSource.onended = null; currentSource.stop(); } catch(e) {}
        currentSource = null;
      }
      clearInterval(progressTimer);
    }

    function stopCurrentAudio() {
      if (isPlaying) audioOffset += audioCtx.currentTime - audioStartTime;
      stopSource();
      isPlaying = false;
    }

    function togglePlay() {
      if (!currentBuffer) return;
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      if (isPlaying) {
        audioOffset += audioCtx.currentTime - audioStartTime;
        stopSource();
        isPlaying = false;
        D['btn-play'].textContent = '▶';
      } else {
        if (audioOffset >= currentBuffer.duration) audioOffset = 0;
        startPlayback();
      }
    }

    function updateProgress() {
      if (!currentBuffer || !isPlaying) return;
      var t = audioOffset + (audioCtx.currentTime - audioStartTime);
      var dur = currentBuffer.duration;
      if (t > dur) t = dur;
      D['progress-fill'].style.width = (t / dur * 100) + '%';
      D['audio-time'].textContent = formatTime(t);
    }

    function seekFromEvent(e) {
      if (!currentBuffer) return;
      var rect = D['progress-bar'].getBoundingClientRect();
      var cx = e.clientX;
      if (e.touches && e.touches.length) cx = e.touches[0].clientX;
      if (e.changedTouches && e.changedTouches.length) cx = e.changedTouches[0].clientX;
      var pct = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
      audioOffset = pct * currentBuffer.duration;
      if (isPlaying) {
        startPlayback();
      } else {
        D['progress-fill'].style.width = (pct * 100) + '%';
        D['audio-time'].textContent = formatTime(audioOffset);
      }
    }

    function formatTime(s) {
      var m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    /* === HISTORY === */
    function addToHistory(name, url) {
      playHistory.unshift({ name: name, url: url, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }) });
      if (playHistory.length > 20) playHistory.pop();
      renderHistory();
    }

    function renderHistory() {
      if (!playHistory.length) { D['audio-history'].style.display = 'none'; return; }
      D['audio-history'].style.display = 'block';
      D['history-list'].innerHTML = '';
      playHistory.forEach(function(item) {
        var div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = '<div class="history-icon">🔊</div><div class="history-info"><div class="history-name">' + esc(item.name) + '</div><div class="history-time">' + item.time + '</div></div>';
        div.addEventListener('click', function() { playAudio(item.url, item.name); });
        D['history-list'].appendChild(div);
      });
    }

    /* === BOOKS === */
    function renderBooks() {
      var g = D['book-grid'];
      if (!config || !config.books || !config.books.length) {
        g.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><span class="empty-icon">📖</span><h3>尚未新增書籍</h3><p>請在 config.json 中設定書籍資料</p></div>';
        return;
      }
      g.innerHTML = '';
      config.books.forEach(function(book, idx) {
        var card = document.createElement('div');
        card.className = 'book-card';
        var cover = book.cover
          ? '<div class="book-cover"><img src="' + esc(book.cover) + '" alt="' + esc(book.title) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="book-cover-emoji" style="display:none">📖</div></div>'
          : '<div class="book-cover"><div class="book-cover-emoji">📖</div></div>';
        card.innerHTML = cover + '<div class="book-info"><div class="book-title">' + esc(book.title) + '</div><div class="book-desc">' + esc(book.description || '') + '</div><div class="book-pages-count">' + (book.pages ? book.pages.length + ' 頁' : '') + '</div></div>';
        card.addEventListener('click', function() { openBook(idx); });
        g.appendChild(card);
      });
    }

    function openBook(idx) {
      currentBook = config.books[idx];
      currentPageIndex = 0;
      showBookPage();
      D['book-modal'].classList.add('open');
    }

    function showBookPage() {
      if (!currentBook || !currentBook.pages) return;
      D['modal-book-title'].textContent = currentBook.title;
      D['modal-page-info'].textContent = '第 ' + (currentPageIndex + 1) + ' / ' + currentBook.pages.length + ' 頁';
      D['modal-page-img'].src = currentBook.pages[currentPageIndex];
      D['btn-prev'].disabled = currentPageIndex === 0;
      D['btn-next'].disabled = currentPageIndex >= currentBook.pages.length - 1;
    }

    function closeBookModal() { D['book-modal'].classList.remove('open'); currentBook = null; }

    /* === WORKSHEETS === */
    function renderWorksheets() {
      var el = D['worksheet-list'];
      if (!config || !config.worksheets || !config.worksheets.length) {
        el.innerHTML = '<div class="empty-state"><span class="empty-icon">📝</span><h3>尚未新增學習單</h3><p>請在 config.json 中設定學習單資料</p></div>';
        return;
      }
      el.innerHTML = config.worksheets.map(function(ws) {
        return '<div class="worksheet-card"><div class="ws-icon">📄</div><div class="ws-info"><div class="ws-title">' + esc(ws.title) + '</div><div class="ws-meta">' + esc(ws.description || '') + '</div><div class="ws-tags">' + (ws.grade ? '<span class="ws-tag">' + esc(ws.grade) + '</span>' : '') + (ws.subject ? '<span class="ws-tag subject">' + esc(ws.subject) + '</span>' : '') + '</div></div><a class="btn-download" href="' + esc(ws.file) + '" download>下載</a></div>';
      }).join('');
    }

    /* === TABS === */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-tab') === tab); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.id === 'panel-' + tab); });
      if (tab === 'scanner') { if (consentDone && !isScanning) startScanner(); }
      else { stopScanner(); }
    }

    /* === UTILS === */
    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function showToast(msg) { D['toast'].textContent = msg; D['toast'].classList.add('show'); setTimeout(function() { D['toast'].classList.remove('show'); }, 3000); }

    /* === INIT === */
    function init() {
      cacheDom();
      D['tab-nav'].style.top = D['app-header'].offsetHeight + 'px';

      document.getElementById('btn-agree').addEventListener('click', handleConsent);
      D['btn-play'].addEventListener('click', togglePlay);
      D['progress-bar'].addEventListener('click', seekFromEvent);
      D['progress-bar'].addEventListener('touchstart', seekFromEvent, { passive: true });
      D['progress-bar'].addEventListener('touchmove', seekFromEvent, { passive: true });
      D['tab-nav'].addEventListener('click', function(e) { var b = e.target.closest('.tab-btn'); if (b) switchTab(b.getAttribute('data-tab')); });
      D['btn-prev'].addEventListener('click', function() { if (currentPageIndex > 0) { currentPageIndex--; showBookPage(); } });
      D['btn-next'].addEventListener('click', function() { if (currentBook && currentPageIndex < currentBook.pages.length - 1) { currentPageIndex++; showBookPage(); } });
      document.getElementById('btn-close-book').addEventListener('click', closeBookModal);

      (function() {
        var sx = 0;
        D['book-modal'].addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; }, { passive: true });
        D['book-modal'].addEventListener('touchend', function(e) {
          var d = sx - e.changedTouches[0].clientX;
          if (Math.abs(d) > 60) {
            if (d > 0 && currentBook && currentPageIndex < currentBook.pages.length - 1) { currentPageIndex++; showBookPage(); }
            else if (d < 0 && currentPageIndex > 0) { currentPageIndex--; showBookPage(); }
          }
        }, { passive: true });
      })();

      document.addEventListener('keydown', function(e) {
        if (!D['book-modal'].classList.contains('open')) return;
        if (e.key === 'ArrowLeft' && currentPageIndex > 0) { currentPageIndex--; showBookPage(); }
        if (e.key === 'ArrowRight' && currentBook && currentPageIndex < currentBook.pages.length - 1) { currentPageIndex++; showBookPage(); }
        if (e.key === 'Escape') closeBookModal();
      });

      loadConfig();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>

  <!-- QR library: async, with fallback CDN -->

  <script>
  (function() {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js';
    s.async = true;
    s.onerror = function() {
      var s2 = document.createElement('script');
      s2.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
      s2.async = true;
      s2.onerror = function() {
        var el = document.getElementById('status-text');
        if (el) el.textContent = '⚠️ 掃描器載入失敗，請確認網路後重新整理';
      };
      document.body.appendChild(s2);
    };
    document.body.appendChild(s);
  })();
  </script>

</body>
